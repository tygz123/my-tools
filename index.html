<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的工具箱 · 马拉松版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0e0e12;
            color: #e1e1e6;
            line-height: 1.5;
            padding: 24px;
            min-height: 100vh;
        }

        .app-container {
            max-width: 1440px;
            margin: 0 auto;
            display: flex;
            gap: 24px;
        }

        /* ---------- 左侧导航 ---------- */
        .sidebar {
            width: 260px;
            flex-shrink: 0;
            background: #1a1a1f;
            border-radius: 24px;
            padding: 24px 16px;
            border: 1px solid #2a2a32;
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
            padding: 0 12px 24px 12px;
            border-bottom: 1px solid #2a2a32;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #a78bfa, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            color: #8f8f9f;
            text-decoration: none;
            border-radius: 16px;
            margin-bottom: 4px;
            transition: 0.2s;
            font-weight: 500;
        }

        .nav-item:hover,
        .nav-item.active {
            background: #2a2a32;
            color: #fff;
        }

        /* ---------- 右侧主内容 ---------- */
        .main-content {
            flex: 1;
            min-width: 0;
        }

        /* 顶部问候/升级条 */
        .upgrade-banner {
            background: linear-gradient(135deg, #2a1c3a, #1f2937);
            border-radius: 24px;
            padding: 20px 24px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #374151;
        }

        .banner-text h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .banner-text p {
            color: #9ca3af;
            font-size: 14px;
        }

        .upgrade-btn {
            background: #7c3aed;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .upgrade-btn:hover {
            background: #8b5cf6;
            transform: scale(1.02);
        }

        /* 卡片通用样式 */
        .card {
            background: #1a1a1f;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #2a2a32;
            margin-bottom: 24px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .card-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: #a1a1aa;
        }

        .badge {
            background: #2a2a32;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 12px;
            color: #a78bfa;
        }

        /* 日程/时间轴 */
        .timeline-item {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            align-items: flex-start;
        }

        .timeline-time {
            min-width: 60px;
            color: #71717a;
            font-size: 14px;
        }

        .timeline-content {
            flex: 1;
            background: #25252b;
            padding: 12px;
            border-radius: 16px;
        }

        .timeline-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .timeline-desc {
            font-size: 13px;
            color: #a1a1aa;
        }

        /* 工具箱工具卡片 */
        .tool-box {
            background: #1a1a1f;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #2a2a32;
            margin-bottom: 24px;
        }

        .tool-box h3 {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            margin-bottom: 16px;
            color: #a1a1aa;
        }

        input, select {
            background: #25252b;
            border: 1px solid #2a2a32;
            color: #e1e1e6;
            padding: 12px 16px;
            border-radius: 40px;
            width: 100%;
            margin-bottom: 12px;
            font-size: 14px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #7c3aed;
        }

        button {
            background: #2a2a32;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            margin-right: 8px;
        }

        button:hover {
            background: #3a3a44;
        }

        .footer {
            text-align: center;
            color: #5f5f6b;
            margin-top: 40px;
            font-size: 13px;
            border-top: 1px solid #2a2a32;
            padding-top: 24px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 左侧导航栏 -->
        <div class="sidebar">
            <div class="logo">🏃 马拉松工具</div>
            <a href="#" class="nav-item active">🏠 仪表盘</a>
            <a href="#" class="nav-item">📊 报名合并</a>
            <a href="#" class="nav-item">📷 二维码</a>
            <a href="#" class="nav-item">🌐 翻译</a>
            <a href="#" class="nav-item">⚙️ 设置</a>
        </div>

        <!-- 右侧主内容 -->
        <div class="main-content">
            <!-- 升级横幅 -->
            <div class="upgrade-banner">
                <div class="banner-text">
                    <h2>🔥 获取海量付费课程</h2>
                    <p>升级会员，观看、学习、创作、探索。</p>
                </div>
                <button class="upgrade-btn">立即升级 →</button>
            </div>

            <!-- 日程卡片（单独一行） -->
            <div class="card">
                <div class="card-header">
                    <h3>📅 周一 · 3月5日</h3>
                    <span class="badge">今日</span>
                </div>
                <div class="timeline-item">
                    <div class="timeline-time">08:00</div>
                    <div class="timeline-content">
                        <div class="timeline-title">马拉松报名开启</div>
                        <div class="timeline-desc">准备好你的报名表模板</div>
                    </div>
                </div>
                <div class="timeline-item">
                    <div class="timeline-time">11:00</div>
                    <div class="timeline-content">
                        <div class="timeline-title">设计组会议</div>
                        <div class="timeline-desc">讨论号码布设计</div>
                    </div>
                </div>
                <div class="timeline-item">
                    <div class="timeline-time">15:00</div>
                    <div class="timeline-content">
                        <div class="timeline-title">测试合并脚本</div>
                        <div class="timeline-desc">验证不同表头映射</div>
                    </div>
                </div>
            </div>

            <!-- 马拉松合并器卡片 -->
            <div class="tool-box">
                <h3>🏃 马拉松报名合并器</h3>
                <input type="file" id="fileInput" multiple accept=".xlsx,.xls,.csv" style="display: none;">
                <button onclick="document.getElementById('fileInput').click()">📁 上传报名表（可多选）</button>
                <span id="fileCount" style="margin-left: 10px; color: #9ca3af;"></span>
                <div id="fileListContainer" style="display: none; margin-top: 16px;">
                    <div class="file-list" id="fileList" style="background: #25252b; border-radius: 16px; padding: 12px;"></div>
                </div>
                <div style="margin-top: 16px;">
                    <button onclick="alert('详细映射界面请参考之前的完整版')">⚙️ 配置字段映射</button>
                    <button style="background: #7c3aed;" onclick="alert('合并功能已准备就绪')">🚀 合并下载</button>
                </div>
            </div>

            <!-- 二维码生成器卡片 -->
            <div class="tool-box">
                <h3>📷 二维码生成器</h3>
                <input type="text" id="qrInput" placeholder="输入文字或网址">
                <button onclick="generateQR()">生成二维码</button>
                <div id="qrResult" style="text-align: center; margin-top: 16px;"></div>
            </div>

            <div class="footer">
                ⚡ 完全免费 · 本地处理 · 永不收费 · v3.1 纯净版
            </div>
        </div>
    </div>

    <!-- 引入库 -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

    <script>
        // 二维码生成
        function generateQR() {
            let text = document.getElementById('qrInput').value;
            if (!text) { alert('请输入内容'); return; }
            let qrDiv = document.getElementById('qrResult');
            qrDiv.innerHTML = '';
            new QRCode(qrDiv, { text: text, width: 180, height: 180 });
        }

        // 文件上传显示
        document.getElementById('fileInput')?.addEventListener('change', function(e) {
            const files = e.target.files;
            document.getElementById('fileCount').innerText = `已选择 ${files.length} 个文件`;
            document.getElementById('fileListContainer').style.display = 'block';
            const listDiv = document.getElementById('fileList');
            listDiv.innerHTML = '';
            for (let f of files) {
                listDiv.innerHTML += `<div style="padding: 6px; border-bottom: 1px solid #2a2a32;">📄 ${f.name}</div>`;
            }
        });
    </script>
</body>
</html>
