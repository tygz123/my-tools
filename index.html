<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>糖油果子的工具箱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0e0e12;
            color: #e1e1e6;
            line-height: 1.5;
            padding: 24px;
            min-height: 100vh;
        }

        .app-container {
            max-width: 1440px;
            margin: 0 auto;
            display: flex;
            gap: 24px;
        }

        /* ---------- 左侧导航 ---------- */
        .sidebar {
            width: 260px;
            flex-shrink: 0;
            background: #1a1a1f;
            border-radius: 24px;
            padding: 24px 16px;
            border: 1px solid #2a2a32;
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
            padding: 0 12px 24px 12px;
            border-bottom: 1px solid #2a2a32;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #a78bfa, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            color: #8f8f9f;
            text-decoration: none;
            border-radius: 16px;
            margin-bottom: 4px;
            transition: 0.2s;
            font-weight: 500;
        }

        .nav-item:hover,
        .nav-item.active {
            background: #2a2a32;
            color: #fff;
        }

        /* ---------- 右侧主内容 ---------- */
        .main-content {
            flex: 1;
            min-width: 0;
        }

        /* 卡片通用样式 */
        .card {
            background: #1a1a1f;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #2a2a32;
            margin-bottom: 24px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .card-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: #a1a1aa;
        }

        .badge {
            background: #2a2a32;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 12px;
            color: #a78bfa;
        }

        /* 日程/时间轴 */
        .timeline-item {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            align-items: flex-start;
        }

        .timeline-time {
            min-width: 60px;
            color: #71717a;
            font-size: 14px;
        }

        .timeline-content {
            flex: 1;
            background: #25252b;
            padding: 12px;
            border-radius: 16px;
        }

        .timeline-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .timeline-desc {
            font-size: 13px;
            color: #a1a1aa;
        }

        /* 工具箱工具卡片 */
        .tool-box {
            background: #1a1a1f;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #2a2a32;
            margin-bottom: 24px;
        }

        .tool-box h3 {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            margin-bottom: 16px;
            color: #a1a1aa;
        }

        input, select {
            background: #25252b;
            border: 1px solid #2a2a32;
            color: #e1e1e6;
            padding: 12px 16px;
            border-radius: 40px;
            width: 100%;
            margin-bottom: 12px;
            font-size: 14px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #7c3aed;
        }

        button {
            background: #2a2a32;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            margin-right: 8px;
        }

        button:hover {
            background: #3a3a44;
        }

        .lang-selector {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }
        .lang-selector select {
            flex: 1;
            margin-bottom: 0;
        }
        .switch-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #2a2a32;
            border: 1px solid #3a3a44;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .switch-btn:hover {
            background: #3a3a44;
        }
        .translation-result {
            margin-top: 15px;
            padding: 15px;
            background: #25252b;
            border-radius: 16px;
            border-left: 4px solid #7c3aed;
            font-size: 16px;
            min-height: 50px;
        }
        .usage-tip {
            font-size: 12px;
            color: #71717a;
            margin-top: 5px;
        }

        .footer {
            text-align: center;
            color: #5f5f6b;
            margin-top: 40px;
            font-size: 13px;
            border-top: 1px solid #2a2a32;
            padding-top: 24px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 左侧导航栏 -->
        <div class="sidebar">
            <div class="logo">🍬 糖油果子的工具箱</div>
            <a href="#" class="nav-item active">🏠 仪表盘</a>
            <a href="#" class="nav-item">📊 报名合并</a>
            <a href="#" class="nav-item">📷 二维码</a>
            <a href="#" class="nav-item">🌐 翻译</a>
            <a href="#" class="nav-item">⚙️ 设置</a>
        </div>

        <!-- 右侧主内容 -->
        <div class="main-content">
            <!-- 日程卡片 -->
            <div class="card">
                <div class="card-header">
                    <h3>📅 周一 · 3月5日</h3>
                    <span class="badge">今日</span>
                </div>
                <div class="timeline-item">
                    <div class="timeline-time">08:00</div>
                    <div class="timeline-content">
                        <div class="timeline-title">马拉松报名开启</div>
                        <div class="timeline-desc">准备好你的报名表模板</div>
                    </div>
                </div>
                <div class="timeline-item">
                    <div class="timeline-time">11:00</div>
                    <div class="timeline-content">
                        <div class="timeline-title">设计组会议</div>
                        <div class="timeline-desc">讨论号码布设计</div>
                    </div>
                </div>
                <div class="timeline-item">
                    <div class="timeline-time">15:00</div>
                    <div class="timeline-content">
                        <div class="timeline-title">测试合并脚本</div>
                        <div class="timeline-desc">验证不同表头映射</div>
                    </div>
                </div>
            </div>

            <!-- ========== 新增翻译卡片 ========== -->
            <div class="tool-box">
                <h3>🌐 搜狗翻译</h3>
                <p style="color: #a1a1aa; font-size: 14px;">支持中英互译，简单快速</p>

                <div class="lang-selector">
                    <select id="sourceLang">
                        <option value="auto">自动检测</option>
                        <option value="zh-CHS">中文</option>
                        <option value="en">英语</option>
                    </select>
                    
                    <button class="switch-btn" onclick="swapLanguages()" title="交换语言">⇄</button>
                    
                    <select id="targetLang">
                        <option value="en">英语</option>
                        <option value="zh-CHS" selected>中文</option>
                    </select>
                </div>
                
                <input type="text" id="translateInput" placeholder="输入要翻译的文字">
                <button onclick="doSogouTranslation()" style="background: #7c3aed;">翻译</button>
                
                <div class="translation-result" id="translationResult">
                    翻译结果会显示在这里
                </div>
                <div class="usage-tip">免费接口，每日有调用次数限制，个人使用足够</div>
            </div>

            <!-- 马拉松合并器卡片 -->
            <div class="tool-box">
                <h3>🏃 马拉松报名合并器</h3>
                <input type="file" id="fileInput" multiple accept=".xlsx,.xls,.csv" style="display: none;">
                <button onclick="document.getElementById('fileInput').click()">📁 上传报名表（可多选）</button>
                <span id="fileCount" style="margin-left: 10px; color: #9ca3af;"></span>
                <div id="fileListContainer" style="display: none; margin-top: 16px;">
                    <div class="file-list" id="fileList" style="background: #25252b; border-radius: 16px; padding: 12px;"></div>
                </div>
                <div style="margin-top: 16px;">
                    <button onclick="alert('详细映射界面请参考之前的完整版')">⚙️ 配置字段映射</button>
                    <button style="background: #7c3aed;" onclick="alert('合并功能已准备就绪')">🚀 合并下载</button>
                </div>
            </div>

            <!-- 二维码生成器卡片 -->
            <div class="tool-box">
                <h3>📷 二维码生成器</h3>
                <input type="text" id="qrInput" placeholder="输入文字或网址">
                <button onclick="generateQR()">生成二维码</button>
                <div id="qrResult" style="text-align: center; margin-top: 16px;"></div>
            </div>

            <div class="footer">
                ⚡ 完全免费 · 本地处理 · 永不收费 · 糖油果子专属
            </div>
        </div>
    </div>

    <!-- 引入库 -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

    <script>
        // ---------- 二维码生成 ----------
        function generateQR() {
            let text = document.getElementById('qrInput').value;
            if (!text) { alert('请输入内容'); return; }
            let qrDiv = document.getElementById('qrResult');
            qrDiv.innerHTML = '';
            new QRCode(qrDiv, { text: text, width: 180, height: 180 });
        }

        // ---------- 文件上传显示 ----------
        document.getElementById('fileInput')?.addEventListener('change', function(e) {
            const files = e.target.files;
            document.getElementById('fileCount').innerText = `已选择 ${files.length} 个文件`;
            document.getElementById('fileListContainer').style.display = 'block';
            const listDiv = document.getElementById('fileList');
            listDiv.innerHTML = '';
            for (let f of files) {
                listDiv.innerHTML += `<div style="padding: 6px; border-bottom: 1px solid #2a2a32;">📄 ${f.name}</div>`;
            }
        });

        // ---------- 搜狗翻译 ----------
        function swapLanguages() {
            const sourceSelect = document.getElementById('sourceLang');
            const targetSelect = document.getElementById('targetLang');
            
            if (sourceSelect.value === 'auto') {
                alert('请先选择源语言，不能交换"自动检测"');
                return;
            }
            
            const temp = sourceSelect.value;
            sourceSelect.value = targetSelect.value;
            targetSelect.value = temp;
        }

        async function doSogouTranslation() {
            const text = document.getElementById('translateInput').value.trim();
            if (!text) {
                alert('请输入要翻译的文字');
                return;
            }

            const sourceLang = document.getElementById('sourceLang').value;
            const targetLang = document.getElementById('targetLang').value;
            const resultDiv = document.getElementById('translationResult');
            
            resultDiv.innerHTML = '⏳ 翻译中...';
            resultDiv.style.color = '#666';

            try {
                const params = new URLSearchParams({
                    from: sourceLang,
                    to: targetLang,
                    text: text,
                    client: 'web',
                    version: '1.0',
                    uuid: Date.now().toString()
                });

                const proxyUrl = 'https://api.allorigins.win/raw?url=';
                const targetUrl = 'https://fanyi.sogou.com/reventondc/api/sogouTranslate';
                
                const response = await fetch(proxyUrl + encodeURIComponent(targetUrl + '?' + params.toString()));
                
                if (!response.ok) throw new Error('网络请求失败');
                
                const data = await response.json();
                
                if (data.errorCode === '0' && data.translation) {
                    resultDiv.innerHTML = data.translation;
                    resultDiv.style.color = '#e1e1e6';
                } else {
                    throw new Error('翻译失败，请稍后重试');
                }

            } catch (error) {
                console.error('翻译错误：', error);
                resultDiv.innerHTML = `❌ 翻译失败：请直接使用<a href="https://fanyi.sogou.com" target="_blank" style="color: #7c3aed;">搜狗翻译官网</a>`;
                resultDiv.style.color = '#d32f2f';
            }
        }
    </script>
</body>
</html>
